spring.application.name=hostmyevent

# Database Configuration — values loaded from .env via BackendApplication
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Jackson — prevent issues with lazy-loaded Hibernate proxies
spring.jackson.serialization.fail-on-empty-beans=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Pinata API Credentials
pinata.api.key=${PINATA_API_KEY}
pinata.api.secret=${PINATA_API_SECRET}
pinata.jwt.key=${PINATA_JWT_KEY}

# SMTP / Email configuration for OTP authentication
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — allowed frontend origins (comma-separated, set in .env)
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# File upload size limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
